name = "media-signer"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Single-environment setup: localhost dev and production both hit this Worker
# and the same R2 bucket. Split into [env.dev] / [env.prod] when real users
# would notice if a deploy broke things.

[vars]
FIREBASE_PROJECT_ID = "ff14-story-timeline"
PRESIGN_TTL_SECONDS = "300"
R2_BUCKET = "narrative"
R2_PUBLIC_BASE = "https://pub-1bd4f6cfa4d44dc79c37b8dcb7f9d9d6.r2.dev"
ALLOWED_ORIGINS = "http://localhost:4200,https://rikisson.github.io"

# Secrets (set via `pnpm secret:put <NAME>`):
#   R2_ACCOUNT_ID
#   R2_ACCESS_KEY_ID
#   R2_SECRET_ACCESS_KEY

# Per-UID rate limit counter for /sign-upload + /sign-delete + /bulk-delete.
# Create the namespace once via:
#   pnpm exec wrangler kv namespace create MEDIA_RATE_LIMIT
# then paste the printed id below.
[[kv_namespaces]]
binding = "MEDIA_RATE_LIMIT"
id = "REPLACE_WITH_REAL_ID_AFTER_KV_CREATE"
