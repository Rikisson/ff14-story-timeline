name = "media-signer"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Single-environment setup: localhost dev and production both hit this Worker
# and the same R2 bucket. Split into [env.dev] / [env.prod] when real users
# would notice if a deploy broke things.

[vars]
FIREBASE_PROJECT_ID = "ff14-story-timeline"
PRESIGN_TTL_SECONDS = "300"
R2_BUCKET = ""             # bucket name created in the Cloudflare R2 dashboard
R2_PUBLIC_BASE = ""        # custom domain or *.r2.dev URL, no trailing slash
ALLOWED_ORIGINS = ""       # comma-separated, e.g. http://localhost:4200,https://<you>.github.io

# Secrets (set via `pnpm secret:put <NAME>`):
#   R2_ACCOUNT_ID
#   R2_ACCESS_KEY_ID
#   R2_SECRET_ACCESS_KEY
