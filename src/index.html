<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Ff14StoryTimeline</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('theme');
          var dark = pref === 'dark' || ((pref === null || pref === 'system') &&
            window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (_) {}
        try {
          var stored = localStorage.getItem('uiLocale');
          var supported = ['en', 'uk'];
          var locale = supported.indexOf(stored) >= 0 ? stored : null;
          if (!locale) {
            var langs = (navigator.languages && navigator.languages.length)
              ? navigator.languages
              : [navigator.language || 'en'];
            for (var i = 0; i < langs.length; i++) {
              var base = String(langs[i]).toLowerCase().split('-')[0];
              if (supported.indexOf(base) >= 0) { locale = base; break; }
            }
          }
          document.documentElement.lang = locale || 'en';
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
