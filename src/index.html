<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Opovid</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="preload"
      href="fonts/plex-sans-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="fonts/plex-sans-cyrillic.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="fonts/cormorant-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <meta
      name="description"
      content="Opovid — build worlds and tell branching, illustrated stories."
    />
    <!-- Browser-chrome colours. The OS can't read CSS variables, so these
         must mirror --color-canvas in src/styles.css (light + dark blocks). -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#faf5ea" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1c1a14" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2" />
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('theme');
          var dark = pref === 'dark' || ((pref === null || pref === 'system') &&
            window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (_) {}
        try {
          var stored = localStorage.getItem('uiLocale');
          var supported = ['en', 'uk'];
          var locale = supported.indexOf(stored) >= 0 ? stored : null;
          if (!locale) {
            var langs = (navigator.languages && navigator.languages.length)
              ? navigator.languages
              : [navigator.language || 'en'];
            for (var i = 0; i < langs.length; i++) {
              var base = String(langs[i]).toLowerCase().split('-')[0];
              if (supported.indexOf(base) >= 0) { locale = base; break; }
            }
          }
          document.documentElement.lang = locale || 'en';
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
