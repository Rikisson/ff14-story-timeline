<ng-container *transloco="let t; prefix: 'general'">
  @if (!chromeHidden()) {
  <header class="relative z-20 flex items-center gap-6 bg-surface shadow-[0_4px_12px_-4px_rgb(40_32_18/0.12)] px-6 py-3">
    <a routerLink="/" class="inline-flex min-w-0 no-underline">
      <app-brand class="max-w-[18rem] md:max-w-[24rem]" [wordOverride]="brandWord()" />
    </a>
    @if (inUniverse()) {
      <nav class="flex items-center gap-1">
        <app-explore-button />
        <app-archives-button />
        @if (isMember()) {
          <app-settings-button />
        }
      </nav>
    }
    <span class="flex-1"></span>
    <app-locale-toggle />
    <app-theme-toggle />
    <app-auth-button />
  </header>

  @if (refreshErrors().length > 0) {
    <div
      class="border-b border-warning-border bg-warning px-6 py-2 text-sm text-warning-foreground"
      role="alert"
    >
      @for (err of refreshErrors(); track err.entityKey) {
        <p class="m-0">
          <strong>{{ t('message.refreshError', { resource: t('entity.' + err.entityKey) }) }}</strong> {{ err.message }}
        </p>
      }
    </div>
  }
  }

  <main class="relative z-0 min-h-0 flex-1 overflow-auto">
    <router-outlet />
    @if (isNavigating()) {
      <div
        class="absolute inset-0 z-50 flex items-center justify-center bg-overlay backdrop-blur-sm"
        role="status"
        aria-live="polite"
        [attr.aria-label]="t('tooltip.loadingPage')"
      >
        <span
          class="inline-block size-10 rounded-full border-4 border-border-strong border-t-foreground animate-spin"
          aria-hidden="true"
        ></span>
      </div>
    }
  </main>
</ng-container>
