<header class="flex items-center gap-6 border-b border-slate-200 px-6 py-3">
  <app-universe-selector />
  <nav class="flex flex-1 gap-4">
    <a
      routerLink="/"
      routerLinkActive="text-slate-900 font-medium"
      [routerLinkActiveOptions]="{ exact: true }"
      class="text-slate-600 no-underline"
    >Stories</a>
    <a
      routerLink="/characters"
      routerLinkActive="text-slate-900 font-medium"
      class="text-slate-600 no-underline"
    >Characters</a>
    <a
      routerLink="/places"
      routerLinkActive="text-slate-900 font-medium"
      class="text-slate-600 no-underline"
    >Places</a>
    <a
      routerLink="/events"
      routerLinkActive="text-slate-900 font-medium"
      class="text-slate-600 no-underline"
    >Events</a>
  </nav>
  @if (canSeed()) {
    <button uiGhost type="button" [loading]="seeding()" (click)="seedTestData()">
      Seed test data
    </button>
  }
  <app-auth-button />
</header>

@if (refreshErrors().length > 0) {
  <div
    class="border-b border-amber-200 bg-amber-50 px-6 py-2 text-sm text-amber-900"
    role="alert"
  >
    @for (err of refreshErrors(); track err.label) {
      <p class="m-0">
        <strong>Couldn't load {{ err.label }}:</strong> {{ err.message }}
      </p>
    }
  </div>
}

<main class="relative min-h-0 flex-1 overflow-auto p-6">
  <router-outlet />
  @if (isNavigating()) {
    <div
      class="absolute inset-0 z-50 flex items-center justify-center bg-white/60 backdrop-blur-sm"
      role="status"
      aria-live="polite"
      aria-label="Loading page"
    >
      <span
        class="inline-block size-10 rounded-full border-4 border-slate-300 border-t-slate-700 animate-spin"
        aria-hidden="true"
      ></span>
    </div>
  }
</main>
